name: API Server Prod Deploy

on:
  push:
    branches: [ main ]  # main 브랜치 push 시 jobs 실행

jobs:
  deploy:
    runs-on: ubuntu-latest

    # OIDC 토큰 발급을 위한 권한 설정 (필수!)
    permissions:
      id-token: write   # OIDC 토큰 요청 권한
      contents: read    # 코드 읽기 권한

    steps:
      # 1. 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Java 25 설정
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'corretto'  # Amazon Corretto

      # 3. Gradle 캐시 (같은 의존성이면 다운로드 생략 → 빌드 빠름)
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. 빌드
      - name: Build with Gradle
        run: ./gradlew clean build -x test --no-daemon

      # 5. OIDC로 AWS 인증 (Access Key 없이!)
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 6. ECR 로그인
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 7. Docker 이미지 빌드 & ECR push
      - name: Build and push to ECR
        env:
          IMAGE_TAG: ${{ github.sha }}  # 커밋 해시를 태그로 사용 (롤백 가능)
        run: |
          docker build -t ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG .
          docker tag ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG \
                     ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest
          docker push ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG
          docker push ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest
          # 이미지 태그를 다음 step에서 쓰기 위해 저장
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      # 8. EC2에 SSH 접속해서 배포
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_TAG  # 앞 step에서 저장한 태그 전달
          script: |
            # ECR 로그인 (EC2 IAM Role 덕분에 키 없이 됨!)
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login --username AWS \
              --password-stdin ${{ secrets.ECR_REGISTRY }}
            
            # 새 이미지 pull
            docker pull ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest
            
            # 기존 컨테이너 중지 & 삭제
            docker stop my-app || true
            docker rm my-app || true
            
             # 새 컨테이너 실행
            docker run -d \
            --name my-app \
            --restart always \
            -p 8080:8080 \
            -e SPRING_DATASOURCE_URL=${{ secrets.DB_URL }} \
            -e SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USERNAME }} \
            -e SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -e SPRING_PROFILES_ACTIVE=prod \
            ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:0.0.1
            
            # 오래된 이미지 정리
            docker image prune -f